name: AI Service CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r ai-service/requirement.txt
        pip install httpx pytest # Required for FastAPI TestClient

    - name: Run Service Tests
      run: |
        cd ai-service
        python -m tests.fit_service
        python -m tests.similarity
        python -m tests.nlp_penalty
        python -m tests.preference
        python -m tests.verify_ranking
        python -m tests.recommendation
